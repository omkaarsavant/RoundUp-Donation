<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#63887c", /* Sage Green */
                        "accent-gold": "#d4af37", /* Gold */
                        "background-light": "#fdfaf5", /* Soft Parchment */
                        "background-dark": "#11211c",
                        "slate-900": "#111815",
                        "slate-100": "#f0f4f3",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }

<style>
        .premium-shimmer {
            background: linear-gradient(135deg, #63887c 0%, #7da396 45%, #d4af37 50%, #7da396 55%, #63887c 100%);
            background-size: 200% auto;
        }
        .organic-shape {
            border-radius: 60% 40% 70% 30% / 40% 50% 60% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-[375px] bg-background-light dark:bg-background-dark shadow-2xl rounded-xl overflow-hidden border border-primary/10 relative">

</div>
<!-- Hero Impact Card -->
<div class="px-6 py-4">
<div class="relative aspect-[4/3] w-full overflow-hidden rounded-xl shadow-lg group">
<div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-slate-900/20 to-transparent z-10"></div>
<img class="w-full h-full object-cover" data-alt="Children smiling together in a community center" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHF5cPuez8Zk8ztptkEHuwl4tznTHIFc8lEjhg4LuucomJ3_KksuorjRqOFkiY1LZhrk7EqfwvJCfU47xfpV0OjEEbRlh2FC2bQw2hXZcmHOxAzGkDEpGISlKjIJHhv3ycYyCbuzMSi4EafC3lIoJde6XjjGrgekFmKkMKNL-SBBoWWtFY8LKB5tdRVSUBT26TKQF3TJC9DzBeFSLqME86gVzCk4LswGPGrz7otOujUdKMtm7dVXFazKEVLwyitZDzfhtzY7YgxncJ"/>
<div class="absolute bottom-0 left-0 p-5 z-20">
<p class="text-white text-2xl font-serif leading-tight">Make an Impact Today</p>
<p class="text-white/80 text-sm mt-1">Your small change builds futures.</p>
</div>
</div>
</div>
<!-- Round-Up Section (Organic Card) -->
<div class="px-6 py-4">
<div class="bg-primary/5 dark:bg-primary/10 border border-primary/10 p-8 flex flex-col items-center justify-center text-center rounded-[2.5rem] relative overflow-hidden">

<div class="absolute -top-10 -right-10 w-32 h-32 bg-accent-gold/5 organic-shape"></div>
<span class="material-symbols-outlined text-accent-gold text-4xl mb-3">volunteer_activism</span>
<h2 class="text-2xl font-serif text-slate-900 dark:text-slate-100 mb-2">Round up to ₹5?</h2>
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium">Small change, big difference</p>
<button class="mt-6 premium-shimmer text-white px-8 py-3 rounded-full font-bold text-sm tracking-wider uppercase shadow-md hover:shadow-lg transition-all">
                    Yes, Round Up
                </button>
</div>
</div>
<!-- Selected NGO Section -->
<div class="px-6 py-4">
<h3 class="text-xs font-bold uppercase tracking-widest text-primary/60 mb-3 ml-1">Selected Cause</h3>
<div class="flex items-center gap-4 bg-white dark:bg-slate-900/50 p-4 rounded-lg border border-primary/5 shadow-sm">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden border border-accent-gold/20">
<img class="w-full h-full object-cover" data-alt="Helping Hands NGO minimalist logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXiBB6fALK0QR3hVMUiWreSf0QmiAcAgSyS9uOy-QNAoK-Y8QIptqiKKouW_Q2Lhr0U7YudfT5BuG6nO908VIwtePPlr6zP78KDFNdTCiMT0-yDmEXKumMcTqYdnde-BVBzpEonREMzYH3n8Vcok6m_z2MRGjIZrHhfC5CUExjOgi3IiIx3yKSbQnes7hQoiXSX5uuBcfK_jWixlXpjAWL2wg7x5r0TYDA29x9izykLDwPbbEUh-lLlQlbPy5bBxqmaCXVveXJAkv_"/>
</div>
<div class="flex-1">
<p class="text-sm font-bold text-slate-900 dark:text-slate-100">Helping Hands NGO</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Education &amp; Nutrition Support</p>
</div>
<span class="material-symbols-outlined text-primary/40">chevron_right</span>
</div>
</div>

<div class="mt-4 border-t border-primary/10 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm">
<div class="flex justify-around items-center py-3 px-6">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined font-variation-fill">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Impact</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Profile</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Tools</span>
</a>
</div>
</div>
</div>
</body></html>
